kind = "web"
previewPath = "/souk/"
title = "Souk — Marketplace"
version = "1.0.0"
id = "artifacts/souk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/souk/" ]
localPort = 23650

[services.development]
run = "pnpm --filter @workspace/souk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/souk", "run", "build" ]
publicDir = "artifacts/souk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23650"
BASE_PATH = "/souk/"
